<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Juli Hermosa ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-principal: #ff4d6d;
            --color-secundario: #ff758f;
            --color-fondo: #fff0f3;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background-color: var(--color-fondo);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* --- FONDO DINÁMICO --- */
        .fondo-animado {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #ffe5ec, #ffc2d1, #ffe5ec);
            background-size: 400% 400%;
            animation: gradienteDinamico 15s ease infinite;
            z-index: 1;
        }

        @keyframes gradienteDinamico {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- CONTENEDOR TIPO CARTA 3D --- */
        .card {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(255, 77, 109, 0.15);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            max-width: 450px;
            width: 85%;
            text-align: center;
            position: relative;
            z-index: 10;
            transform-style: preserve-3d;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: translateY(-5px) rotateX(2deg) rotateY(2deg);
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--color-principal);
            font-size: 3rem;
            margin-top: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        /* --- EFECTO MÁQUINA DE ESCRIBIR --- */
        .texto-interactivo {
            font-size: 1.2rem;
            color: #4a4a4a;
            line-height: 1.8;
            margin-bottom: 30px;
            min-height: 120px;
            font-weight: 600;
        }

        /* --- BOTONES MODERNOS --- */
        .btn-wrapper {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 60px;
            margin-top: 20px;
        }

        .btn {
            padding: 14px 35px;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .btn-principal {
            background: linear-gradient(135deg, var(--color-principal), var(--color-secundario));
            color: white;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.3);
        }

        .btn-principal:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 25px rgba(255, 77, 109, 0.45);
        }

        .btn-fantasma {
            background-color: #6c757d;
            color: white;
            position: absolute;
            left: 55%;
        }

        /* --- ELEMENTOS FLOTANTES --- */
        .elemento-flotante {
            position: absolute;
            pointer-events: none;
            z-index: 2;
            animation: volar 4s linear forwards;
        }

        @keyframes volar {
            0% { transform: translateY(105vh) scale(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; transform: translateY(90vh) scale(1); }
            90% { opacity: 0.8; }
            100% { transform: translateY(-15vh) scale(0.5) rotate(360deg); opacity: 0; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="fondo-animado"></div>

    <div class="card" id="main-card">
        <h1 id="main-title">¡Hola, Juli! ✨</h1>
        <div class="texto-interactivo" id="main-text">
            Tengo un secreto guardado para ti aquí adentro... ¿Quieres descubrirlo?
        </div>
        
        <div class="btn-wrapper">
            <button class="btn btn-principal" id="action-btn">Comenzar 💖</button>
            <button class="btn btn-fantasma hidden" id="escape-btn">No 😢</button>
        </div>
    </div>

    <script>
        let step = 1;
        const title = document.getElementById('main-title');
        const textContainer = document.getElementById('main-text');
        const actionBtn = document.getElementById('action-btn');
        const escapeBtn = document.getElementById('escape-btn');

        // Textos con efecto de escritura
        const dialogues = [
            "Desde que entraste en mis días, todo tiene un color diferente. Me encanta cómo me haces sonreír, tu risa, y que me permitas decirte Juli... 🌸",
            "He estado pensando mucho en nosotros y en lo feliz que me haces. No quiero que esto sea solo un momento pasajero... 🌹",
            "Por eso, Diana Julissa... hoy quiero hacerte la pregunta más importante del año de una forma única, justo como tú te lo mereces: ¿Aceptarías ser mi novia? 👑❤️"
        ];

        // Función para simular máquina de escribir
        function typeWriter(text, i, callback) {
            if (i < text.length) {
                textContainer.innerHTML = text.substring(0, i + 1);
                setTimeout(() => typeWriter(text, i + 1, callback), 35);
            } else if (callback) {
                callback();
            }
        }

        actionBtn.addEventListener('click', () => {
            if (step === 1) {
                title.textContent = "Para mi Juli...";
                actionBtn.style.opacity = 0;
                typeWriter(dialogues[0], 0, () => { actionBtn.textContent = "Continuar ✨"; actionBtn.style.opacity = 1; });
                step = 2;
            } else if (step === 2) {
                actionBtn.style.opacity = 0;
                typeWriter(dialogues[1], 0, () => { actionBtn.textContent = "Siguiente ➔"; actionBtn.style.opacity = 1; });
                step = 3;
            } else if (step === 3) {
                title.textContent = "Una propuesta...";
                actionBtn.style.opacity = 0;
                typeWriter(dialogues[2], 0, () => {
                    actionBtn.textContent = "¡SÍ, ACEPTO! 💝";
                    actionBtn.style.opacity = 1;
                    escapeBtn.classList.remove('hidden');
                });
                step = 4;
            } else if (step === 4) {
                celebrate();
            }
        });

        // --- DINÁMICA DE EVASIÓN DEL BOTÓN "NO" ---
        const moveButton = () => {
            const padding = 40;
            // El botón se mueve dinámicamente por TODA la pantalla para que no pueda atraparlo
            const x = Math.random() * (window.innerWidth - escapeBtn.offsetWidth - padding * 2) + padding;
            const y = Math.random() * (window.innerHeight - escapeBtn.offsetHeight - padding * 2) + padding;
            
            escapeBtn.style.position = 'fixed';
            escapeBtn.style.left = `${x}px`;
            escapeBtn.style.top = `${y}px`;
        };

        escapeBtn.addEventListener('mouseenter', moveButton);
        escapeBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });

        // --- CELEBRACIÓN DE VICTORIA ---
        function celebrate() {
            title.textContent = "¡SABÍA QUE SÍ! 👑🎉";
            textContainer.innerHTML = "¡Me haces el chico más afortunado del mundo, Juli! <br><br> Prometo cuidarte, escucharte, hacerte reír y estar para ti en cada paso. ¡Comienza nuestra historia! 🥰❤️";
            
            actionBtn.classList.add('hidden');
            escapeBtn.classList.add('hidden');

            // Generador masivo de partículas románticas de fondo
            setInterval(() => createFloatingElement(['❤️', '💖', '✨', '🌸', '🌹', '🦋'][Math.floor(Math.random() * 6)]), 80);
        }

        function createFloatingElement(symbol) {
            const el = document.createElement('div');
            el.classList.add('elemento-flotante');
            el.innerText = symbol;
            el.style.left = Math.random() * 100 + "vw";
            el.style.fontSize = Math.random() * 25 + 15 + "px";
            el.style.animationDuration = Math.random() * 2 + 2.5 + "s";
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }
    </script>
</body>
</html>
